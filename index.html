<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediCore SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
  margin:0;
  font-family:'DM Sans', sans-serif;
  background:#0d1117;
  color:#e6edf3;
}

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box {
  width:900px;
  height:520px;
  display:flex;
  background:#161b22;
  border:1px solid #30363d;
  border-radius:16px;
  overflow:hidden;
}

.left {
  flex:1;
  background:linear-gradient(135deg,#2ea87e,#1a2a3d);
  padding:40px;
  color:white;
}

.right {
  flex:1;
  padding:50px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

input, select {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #30363d;
  background:#0d1117;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:#2ea87e;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

/* DASHBOARD */
#app {
  display:none;
  padding:20px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.card {
  background:#161b22;
  padding:20px;
  border-radius:10px;
  border:1px solid #30363d;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">

    <div class="left">
      <h1>MediCore SaaS</h1>
      <p>Clinic Management System</p>
      <img src="https://images.unsplash.com/photo-1580281657527-47f249e8f8c1"
           style="width:100%;border-radius:10px;margin-top:20px;">
    </div>

    <div class="right">
      <h2>Welcome Back</h2>

      <input id="email" placeholder="Email" />
      <select id="role">
        <option value="admin">Admin</option>
        <option value="doctor">Doctor</option>
        <option value="pharmacist">Pharmacist</option>
      </select>

      <button onclick="login()">Continue to Dashboard</button>
    </div>

  </div>
</div>

<!-- DASHBOARD -->
<div id="app">

  <div class="header">
    <h2>Dashboard</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">Patients: 124</div>
  <div class="card">Queue: 8 waiting</div>
  <div class="card">Inventory: OK</div>

</div>

<script>
function login() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function logout() {
  document.getElementById("login").style.display = "flex";
  document.getElementById("app").style.display = "none";
}
</script>

</body>
</html>
