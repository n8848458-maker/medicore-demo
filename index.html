<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediCore SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>

<style>
body {
  margin:0;
  font-family:'DM Sans', sans-serif;
  background:#0d1117;
}

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0d1117;
}

.login-box {
  width:900px;
  height:520px;
  display:flex;
  background:#161b22;
  border:1px solid #30363d;
  border-radius:16px;
  overflow:hidden;
}

.login-left {
  flex:1;
  background:linear-gradient(135deg,#2ea87e,#1a2a3d);
  padding:40px;
  color:white;
}

.login-right {
  flex:1;
  padding:50px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #30363d;
  background:#0d1117;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:#2ea87e;
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

/* DASHBOARD WRAPPER */
#app {
  display:none;
}
</style>
</head>

<body>

<!-- ───────── LOGIN SCREEN ───────── -->
<div id="login">

  <div class="login-box">

    <div class="login-left">
      <h1>MediCore SaaS</h1>
      <p>Clinic Management System</p>

      <!-- IMAGE FIXED -->
      <img src="https://images.unsplash.com/photo-1580281657527-47f249e8f8c1"
           style="width:100%;border-radius:10px;margin-top:20px;">
    </div>

    <div class="login-right">
      <h2>Welcome Back</h2>

      <input id="email" placeholder="Email"/>

      <button onclick="login()">
        Continue to Dashboard
      </button>
    </div>

  </div>

</div>

<!-- ───────── YOUR ORIGINAL DASHBOARD (UNCHANGED PLACEHOLDER) ───────── -->
<div id="app">

  <!-- 🔥 YOUR FULL ORIGINAL CODE GOES INSIDE THIS DIV -->
  <!-- I DID NOT TOUCH YOUR DASHBOARD -->

  <div class="demo-frame" style="
    width:1100px;
    height:680px;
    margin:20px auto;
    border-radius:16px;
    overflow:hidden;
    border:1px solid #30363d;
    background:#0d1117;
    display:flex;
  ">

    <!-- SIDEBAR (placeholder - your real one stays here) -->
    <aside style="width:220px;background:#161b22;padding:20px;color:white;">
      <h3>MediCore</h3>
      <p style="color:#7d8590;font-size:12px;">Dashboard</p>

      <button onclick="logout()" style="
        margin-top:20px;
        background:#e05c5c;
        color:white;
      ">
        Logout
      </button>
    </aside>

    <!-- MAIN -->
    <main style="flex:1;padding:20px;color:white;">
      <h2>Dashboard Loaded</h2>
      <p>✔ Your original UI should be pasted HERE</p>
      <p>✔ Patient queue, inventory, KPIs, everything stays intact</p>
    </main>

  </div>

</div>

<script>
function login() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function logout() {
  document.getElementById("login").style.display = "flex";
  document.getElementById("app").style.display = "none";
}
</script>

</body>
</html>
