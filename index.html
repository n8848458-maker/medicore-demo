<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediCore SaaS</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>

<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --green: #2ea87e;
  --text: #e6edf3;
  --text-muted: #7d8590;
}

/* RESET */
body {
  margin:0;
  font-family:'DM Sans', sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ───────── LOGIN ───────── */
#login {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-box {
  width:900px;
  height:520px;
  display:flex;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
}

.login-left {
  flex:1;
  background:linear-gradient(135deg,#2ea87e,#1a2a3d);
  padding:40px;
  color:white;
}

.login-right {
  flex:1;
  padding:50px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#0d1117;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:var(--green);
  border:none;
  border-radius:8px;
  font-weight:700;
  cursor:pointer;
}

/* ───────── DASHBOARD (YOUR ORIGINAL WRAPPER KEPT) ───────── */
#app {
  display:none;
}

/* ───────── YOUR ORIGINAL UI (UNCHANGED) ───────── */
.demo-frame {
  width:1100px;
  height:680px;
  margin:40px auto;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:16px;
  display:flex;
  overflow:hidden;
}
</style>
</head>

<body>

<!-- ───────── LOGIN SCREEN ───────── -->
<div id="login">

  <div class="login-box">

    <div class="login-left">
      <h1>MediCore SaaS</h1>
      <p>Clinic Management System</p>

      <img src="https://images.unsplash.com/photo-1580281657527-47f249e8f8c1"
           style="width:100%;border-radius:10px;margin-top:20px;">
    </div>

    <div class="login-right">
      <h2>Welcome Back</h2>

      <input id="email" placeholder="Email"/>

      <button onclick="login()">
        Continue to Dashboard
      </button>
    </div>

  </div>

</div>

<!-- ───────── DASHBOARD (YOUR FULL ORIGINAL UI GOES HERE) ───────── -->
<div id="app">
  <div class="demo-frame">

    <!-- 🔥 PASTE YOUR ORIGINAL DASHBOARD CONTENT HERE -->
    <!-- I DID NOT CHANGE YOUR UI -->

    <aside style="width:220px;background:#161b22;padding:20px;">
      <h3>MediCore</h3>
      <p style="color:#7d8590;font-size:12px;">Sidebar</p>
      <button onclick="logout()" style="margin-top:20px;">Logout</button>
    </aside>

    <main style="flex:1;padding:20px;">
      <h2>Dashboard</h2>
      <p>Patients: 124</p>
      <p>Queue: 8 waiting</p>
      <p>Inventory: OK</p>
    </main>

  </div>
</div>

<script>
function login() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function logout() {
  document.getElementById("login").style.display = "flex";
  document.getElementById("app").style.display = "none";
}
</script>

</body>
</html>
